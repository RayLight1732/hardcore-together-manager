name: Workflow
on:
  push:
  pull_request:
    types: [ opened, reopened ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Refresh docs from hardcore-together-docs
        run: make docs

      - name: Fail if docs/ is out of sync with hardcore-together-docs
        run: git diff --exit-code docs/
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # go.mod targets go1.25; the prebuilt golangci-lint binary can lag
          # behind and refuse to run against a newer `go` directive than it
          # was itself compiled with, so build it from source with the Go
          # toolchain setup-go just installed instead.
          install-mode: goinstall
          args: --timeout 3m0s
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go with cache
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod

      - name: Test
        run: make test
  releaser:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
