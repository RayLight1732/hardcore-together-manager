version: 2

# cmd/fakehardcore is a test-only stub for internal/e2e and must not ship
# in releases (architecture-manager.md 1節), so only cmd/manager is built.
builds:
  - id: manager
    main: ./cmd/manager
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: manager
    ids:
      - manager
    # Fixed, predictable names (rather than GoReleaser's default
    # "Linux"/"x86_64"-style template) since hardcore-together-deploy's
    # Dockerfile downloads this asset by constructing the filename itself.
    name_template: "manager_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
