version: 2

# cmd/fakehardcore is a test-only stub for internal/e2e and must not ship
# in releases (architecture-manager.md 1節), so only cmd/manager is built.
builds:
  - id: manager
    main: ./cmd/manager
    binary: manager
    env:
      - CGO_ENABLED=0
    # Only linux is tested (CI's test job runs on ubuntu-latest only) and
    # only linux is actually deployed (hardcore-together-deploy's
    # manager/Dockerfile downloads manager_linux_<arch>.tar.gz), so don't
    # release darwin/windows binaries that nothing exercises.
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: manager
    ids:
      - manager
    # Fixed, predictable name (rather than GoReleaser's default
    # "Linux"/"x86_64"-style template) since hardcore-together-deploy's
    # Dockerfile downloads this asset by constructing the filename itself.
    name_template: "manager_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
