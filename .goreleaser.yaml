version: 2

# cmd/fakehardcore is a test-only stub for internal/e2e and must not ship
# in releases (architecture-manager.md 1節), so only cmd/manager is built.
builds:
  - id: manager
    main: ./cmd/manager
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: manager
    ids:
      - manager
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"

# DOCKER_IMAGE is set by the workflow's releaser job (needs.build.outputs.image_tag,
# .github/workflows/workflow.yml) since the image itself is built and pushed by the
# separate build job (docker/build-push-action), not by GoReleaser.
release:
  footer: |
    ## Docker image

    ```
    docker pull {{ .Env.DOCKER_IMAGE }}
    ```
